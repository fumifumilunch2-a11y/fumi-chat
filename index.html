<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秘密基地チャット</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="chat-header">
        <div class="room-title">秘密基地 💬</div>
        <button id="theme-btn" class="theme-btn">背景切替</button>
    </header>

    <main class="chat-main">
        <div id="message-container" class="message-container">
            <div class="message other">
                <div class="bubble">ようこそ！ここは秘密のチャットルームです。</div>
            </div>
            <div class="message mine">
                <div class="bubble">ここに自分の送信したメッセージが出ます。</div>
            </div>
        </div>
    </main>

    <footer class="chat-footer">
        <div class="input-area">
            <input type="text" id="message-input" placeholder="メッセージを入力..." autocomplete="off">
            <button id="send-btn">送信</button>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
